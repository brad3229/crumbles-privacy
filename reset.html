<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Crumbles</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 32px 28px;
      width: 100%;
      max-width: 420px;
    }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .logo img { width: 32px; height: 32px; object-fit: contain; }
    .logo span { font-size: 20px; font-weight: 800; color: #fff; }
    h1 { font-size: 24px; font-weight: 800; color: #fff; margin-bottom: 8px; }
    p { font-size: 14px; color: #888; margin-bottom: 24px; }
    input {
      width: 100%;
      background: #111;
      border: 1.5px solid #2a2a2a;
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      padding: 14px;
      margin-bottom: 12px;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    .match { font-size: 13px; font-weight: 600; margin-bottom: 12px; min-height: 20px; }
    .match.ok { color: #34d058; }
    .match.bad { color: #f87171; }
    button {
      width: 100%;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { margin-top: 16px; font-size: 14px; text-align: center; min-height: 20px; }
    .msg.success { color: #34d058; }
    .msg.error { color: #f87171; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="./logo.png" alt="Crumbles" />
      <span>Crumbles</span>
    </div>
    <h1>Set New Password</h1>
    <p>Enter a new password for your account.</p>
    <input type="password" id="password" placeholder="New password" oninput="checkMatch()" />
    <input type="password" id="confirm" placeholder="Confirm new password" oninput="checkMatch()" />
    <div class="match" id="match"></div>
    <button id="btn" onclick="submit()" disabled>Save Password</button>
    <div class="msg" id="msg">Verifying reset link...</div>
    <div id="debug" style="font-size:11px;color:#555;margin-top:12px;word-break:break-all;"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://uauhvmpwvckdukwyjnqw.supabase.co';
    const ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVhdWh2bXB3dmNrZHVrd3lqbnF3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2MjY5MzgsImV4cCI6MjA5NDIwMjkzOH0.9b9o7u3XFR9Zjo_JLODe1e6maOqvXT2GPFgBCq5vQhM';

    // 1. Read tokens from hash BEFORE Supabase client clears them
    const hashParams = new URLSearchParams(window.location.hash.substring(1));
    const access_token = hashParams.get('access_token');
    const refresh_token = hashParams.get('refresh_token');

    // 2. Clear the hash so Supabase client won't interfere
    history.replaceState(null, '', window.location.pathname);

    // 3. Init client with detectSessionInUrl OFF
    const client = supabase.createClient(SUPABASE_URL, ANON_KEY, {
      auth: { detectSessionInUrl: false, persistSession: false }
    });

    // 4. Manually set the session from the tokens we captured
    async function init() {
      const btn = document.getElementById('btn');
      const msg = document.getElementById('msg');
      const dbg = document.getElementById('debug');
      dbg.textContent = 'token: ' + (access_token ? access_token.substring(0,20)+'...' : 'NONE');

      if (!access_token || !refresh_token) {
        msg.textContent = 'Invalid or expired reset link. Please request a new one in the app.';
        msg.className = 'msg error';
        return;
      }

      const { error } = await client.auth.setSession({ access_token, refresh_token });
      if (error) {
        msg.textContent = 'Session error: ' + error.message;
        msg.className = 'msg error';
        return;
      }

      msg.textContent = '';
      btn.disabled = false;
    }

    init();

    function checkMatch() {
      const p = document.getElementById('password').value;
      const c = document.getElementById('confirm').value;
      const el = document.getElementById('match');
      if (!c) { el.textContent = ''; return; }
      if (p === c) { el.textContent = 'Passwords match ✓'; el.className = 'match ok'; }
      else { el.textContent = 'Passwords do not match'; el.className = 'match bad'; }
    }

    async function submit() {
      const p = document.getElementById('password').value;
      const c = document.getElementById('confirm').value;
      const btn = document.getElementById('btn');
      const msg = document.getElementById('msg');

      if (p.length < 8) { msg.textContent = 'Password must be at least 8 characters.'; msg.className = 'msg error'; return; }
      if (p !== c) { msg.textContent = 'Passwords do not match.'; msg.className = 'msg error'; return; }

      btn.disabled = true;
      btn.textContent = 'Saving...';
      const { error } = await client.auth.updateUser({ password: p });
      if (error) {
        msg.textContent = error.message;
        msg.className = 'msg error';
        btn.disabled = false;
        btn.textContent = 'Save Password';
      } else {
        msg.textContent = '✓ Password updated! You can now sign in to the app.';
        msg.className = 'msg success';
        btn.textContent = 'Done';
      }
    }
  </script>
</body>
</html>
